name: "Zedium: Sync upstream"

on:
  schedule:
    # Every 6 hours; upstream moves fast but the merge PR batches it.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Upstream syncs bring in zed-industries' workflow files, and any NEW
      # workflow arrives enabled by default. Re-disable everything that is
      # not ours on every run, before doing anything else.
      - name: Disable inherited upstream workflows
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh workflow list --all --json id,path,state --jq '
            .[]
            | select(.state == "active")
            | select(.path | startswith(".github/workflows/"))
            | select(.path | startswith(".github/workflows/zedium_") | not)
            | .id' \
          | while read -r workflow_id; do
              gh workflow disable "$workflow_id"
            done

      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fast-forward main from upstream
        run: |
          git remote add upstream https://github.com/zed-industries/zed.git
          git fetch upstream main
          # main is a pristine mirror; a non-fast-forward means it diverged
          # and needs human attention, so --ff-only failing the job is correct.
          git merge --ff-only upstream/main
          git push origin main

      # Gate on main being ahead of zedium rather than on whether this run
      # moved main: a previous run may have moved main and then failed
      # before the PR existed.
      - name: Ensure merge PR into zedium exists
        env:
          # The built-in token cannot create PRs whose diff touches workflow
          # files (upstream edits theirs regularly); SYNC_TOKEN is a
          # fine-grained PAT scoped to this repo.
          GH_TOKEN: ${{ secrets.SYNC_TOKEN || github.token }}
        run: |
          ahead="$(gh api "repos/${GITHUB_REPOSITORY}/compare/zedium...main" --jq '.ahead_by')"
          if [ "$ahead" = "0" ]; then
            echo "zedium already contains main; no PR needed"
            exit 0
          fi
          existing="$(gh pr list --base zedium --head main --state open --json number --jq 'length')"
          if [ "$existing" = "0" ]; then
            gh pr create --base zedium --head main \
              --title "Merge upstream main into zedium" \
              --body "$(printf 'Automated upstream sync. Review the CI result and any conflicts before merging.\n\nRelease Notes:\n\n- N/A')"
          fi
