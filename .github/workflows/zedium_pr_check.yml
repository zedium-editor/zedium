name: "Zedium: PR checks"

# Runs against the PR's merge ref (the result of merging the PR into its
# base), so a green check means the post-merge tree compiles and passes
# tests. Applies to sync PRs (main -> zedium) and feature PRs alike.
on:
  pull_request:
    branches:
      - zedium
  workflow_dispatch:

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      # The workspace debug+test build plus restored cargo cache exceeds the
      # runner's free disk. Debug info dominates target size and incremental
      # artifacts double it; CI benefits from neither. Costs line numbers in
      # test-failure backtraces.
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_INCREMENTAL: 0
    steps:
      # Reclaim ~25 GB by removing preinstalled toolchains we never use.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      # Even with debug info off, the ~100 statically-linked test binaries of
      # a workspace test build outgrow the root disk. The runner's scratch
      # disk at /mnt (~65 GB) exists solely for workloads like this.
      - name: Put the cargo target dir on the scratch disk
        run: |
          sudo mkdir -p /mnt/cargo-target
          sudo chown "$USER" /mnt/cargo-target
          echo "CARGO_TARGET_DIR=/mnt/cargo-target" >> "$GITHUB_ENV"
          df -h / /mnt

      - name: Check out merge result
        uses: actions/checkout@v4
        with:
          # The merge commit's first parent is the current base tip, needed
          # for the diff-scoped test filter below.
          fetch-depth: 2

      # Mirrors upstream's run_tests orchestrate step: map the PR's diff to
      # workspace packages and test only those plus their reverse
      # dependencies. Anything that can't be safely scoped (toolchain, cargo
      # config, CI, root manifests, unmappable files) falls back to the full
      # suite. workflow_dispatch runs always use the full suite.
      - name: Compute diff-scoped test filter
        id: filter
        run: |
          set -euo pipefail
          echo "changed_packages=" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Not a PR; running full test suite"
            exit 0
          fi
          if ! git rev-parse -q --verify 'HEAD^1' > /dev/null; then
            echo "Base parent unavailable; running full test suite"
            exit 0
          fi
          # The checkout is the merge ref, so HEAD^1 is the base tip and this
          # diff is exactly what merging the PR would change.
          CHANGED_FILES="$(git diff --name-only 'HEAD^1' HEAD)"
          if echo "$CHANGED_FILES" | grep -qP '^(rust-toolchain\.toml|\.cargo/|\.github/|Cargo\.(toml|lock)$)'; then
            echo "Toolchain, cargo config, CI, or root manifest changed; running full test suite"
            exit 0
          fi

          CHANGED_DIRS=$(echo "$CHANGED_FILES" | grep -oP '^(crates|tooling)/\K[^/]+' | sort -u || true)
          # Map directory names to real package names; directories outside the
          # root workspace (e.g. tooling/lints) have no mapping and are
          # skipped, which falls through to the full suite if nothing maps.
          DIR_TO_PKG=$(cargo metadata --format-version=1 --no-deps 2>/dev/null | \
            jq -r '.packages[] | select(.manifest_path | test("crates/|tooling/")) | "\(.manifest_path | capture("(crates|tooling)/(?<dir>[^/]+)") | .dir)=\(.name)"')

          PKGS=""
          for dir in $CHANGED_DIRS; do
            pkg=$(echo "$DIR_TO_PKG" | grep "^${dir}=" | cut -d= -f2 | head -1 || true)
            if [ -n "$pkg" ]; then
              PKGS=$(printf '%s\n%s' "$PKGS" "$pkg")
            fi
          done

          # Assets are compiled into these crates; the dependency graph cannot
          # see that coupling.
          if echo "$CHANGED_FILES" | grep -qP '^assets/'; then
            PKGS=$(printf '%s\n%s\n%s' "$PKGS" "settings" "assets")
          fi

          PKGS=$(echo "$PKGS" | grep -v '^$' | sort -u || true)
          if [ -z "$PKGS" ]; then
            echo "No changed packages detected; running full test suite"
            exit 0
          fi

          FILTERSET=$(echo "$PKGS" | sed 's/.*/rdeps(&)/' | paste -sd '|' -)
          echo "Changed packages filterset: $FILTERSET"
          echo "changed_packages=$FILTERSET" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        run: ./script/linux

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Fail fast on compile errors (the common upstream-churn breakage)
      # before paying for the full test build.
      - name: cargo check
        run: cargo check --package zed

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      # Exclusions, all environment-dependent rather than code-dependent:
      # - collab: its *_postgres tests need a database; upstream CI runs a
      #   postgres service container. We don't ship the collab server, so
      #   compile coverage (via the workspace build) is enough.
      # - gpui_wgpu: atlas tests request a real graphics adapter; hosted
      #   runners have no GPU and no software Vulkan driver.
      # - extension_host's test extension install: compiles a wasm extension
      #   with a hard 60s internal timeout, which 4-core hosted runners miss.
      - name: Run tests
        env:
          CHANGED_PACKAGES: ${{ steps.filter.outputs.changed_packages }}
        run: |
          EXCLUSIONS='package(collab) or package(gpui_wgpu) or (package(extension_host) and test(test_extension_store_with_test_extension))'
          if [ -n "$CHANGED_PACKAGES" ]; then
            EXPR="($CHANGED_PACKAGES) and not ($EXCLUSIONS)"
          else
            EXPR="not ($EXCLUSIONS)"
          fi
          echo "Filter: $EXPR"
          cargo nextest run --workspace --no-fail-fast --no-tests=warn -E "$EXPR"
