name: "Zedium: PR checks"

# Runs against the PR's merge ref (the result of merging the PR into its
# base), so a green check means the post-merge tree compiles and passes
# tests. Applies to sync PRs (main -> zedium) and feature PRs alike.
on:
  pull_request:
    branches:
      - zedium
  workflow_dispatch:

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      # The workspace debug+test build plus restored cargo cache exceeds the
      # runner's free disk. Debug info dominates target size and incremental
      # artifacts double it; CI benefits from neither. Costs line numbers in
      # test-failure backtraces.
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_INCREMENTAL: 0
    steps:
      # Reclaim ~25 GB by removing preinstalled toolchains we never use.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      # Even with debug info off, the ~100 statically-linked test binaries of
      # a workspace test build outgrow the root disk. The runner's scratch
      # disk at /mnt (~65 GB) exists solely for workloads like this.
      - name: Put the cargo target dir on the scratch disk
        run: |
          sudo mkdir -p /mnt/cargo-target
          sudo chown "$USER" /mnt/cargo-target
          echo "CARGO_TARGET_DIR=/mnt/cargo-target" >> "$GITHUB_ENV"
          df -h / /mnt

      - name: Check out merge result
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: ./script/linux

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Fail fast on compile errors (the common upstream-churn breakage)
      # before paying for the full test build.
      - name: cargo check
        run: cargo check --package zed

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      # Exclusions, all environment-dependent rather than code-dependent:
      # - collab: its *_postgres tests need a database; upstream CI runs a
      #   postgres service container. We don't ship the collab server, so
      #   compile coverage (via the workspace build) is enough.
      # - gpui_wgpu: atlas tests request a real graphics adapter; hosted
      #   runners have no GPU and no software Vulkan driver.
      # - extension_host's test extension install: compiles a wasm extension
      #   with a hard 60s internal timeout, which 4-core hosted runners miss.
      - name: Run tests
        run: |
          cargo nextest run --workspace --no-fail-fast \
            -E 'not (package(collab) or package(gpui_wgpu) or (package(extension_host) and test(test_extension_store_with_test_extension)))'
